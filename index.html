<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09/06/2026 - El Gran Evento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --midnight: #050508;
            --bronze-gold: #d4af37;
            --cyan-glow: #00f2fe;
            --festival-orange: #ff5722; /* Tono cálido sacado del cartel */
            --text-light: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #020204;
            color: var(--text-light);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 15px;
        }

        .card-container {
            width: 100%;
            max-width: 700px;
            background-color: var(--midnight);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 87, 34, 0.03) 0%, transparent 70%);
        }

        /* Fase de intriga */
        .sub-cue {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.5em;
            color: var(--cyan-glow);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: var(--bronze-gold);
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            line-height: 1.2;
        }

        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bronze-gold), transparent);
            margin: 25px auto 40px auto;
        }

        /* Marcador */
        .countdown-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 550px;
            margin: 0 auto;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 18px 5px;
        }

        .time-value {
            display: block;
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-label {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            color: #8a8a93;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .date-footer {
            margin-top: 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--bronze-gold);
            letter-spacing: 0.2em;
            opacity: 0.8;
        }

        /* --- PANTALLA DE REVELACIÓN (FESTIVAL) --- */
        #reveal-zone {
            display: none;
            animation: rockIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        #reveal-zone h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--festival-orange);
        }

        .poster-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 30px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 87, 34, 0.35);
            border: 2px solid #ff7a47;
        }

        .poster-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .action-btn {
            background: var(--festival-orange);
            border: none;
            color: #fff;
            padding: 14px 35px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(255, 87, 34, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: scale(1.05);
            background: #ff7a47;
            box-shadow: 0 5px 30px rgba(255, 87, 34, 0.6);
        }

        @keyframes rockIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Ajustes Pantallas Móviles */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            #reveal-zone h1 { font-size: 2.3rem; }
            .countdown-board { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .time-value { font-size: 2.3rem; }
            .card-container { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <main class="card-container">
        <div id="countdown-zone">
            <p class="sub-cue">El misterio está por revelarse</p>
            <h1>PRÓXIMAMENTE</h1>
            <div class="divider"></div>

            <section class="countdown-board">
                <div class="time-box">
                    <span id="days" class="time-value">00</span>
                    <span class="time-label">Días</span>
                </div>
                <div class="time-box">
                    <span id="hours" class="time-value">00</span>
                    <span class="time-label">Horas</span>
                </div>
                <div class="time-box">
                    <span id="minutes" class="time-value">00</span>
                    <span class="time-label">Minutos</span>
                </div>
                <div class="time-box">
                    <span id="seconds" class="time-value">00</span>
                    <span class="time-label">Segundos</span>
                </div>
            </section>

            <p class="date-footer">09 . 06 . 2026</p>
        </div>

        <div id="reveal-zone">
            <p class="sub-cue" style="color: var(--festival-orange); text-shadow: none;">¡LA LEYENDA SIGUE EN VIVO!</p>
            <h1>FESTIVAL 36 & FABULOSA</h1>
            <div class="divider" style="background: linear-gradient(90deg, transparent, var(--festival-orange), transparent);"></div>
            
            <div class="poster-wrapper">
                <img src="cartel.png" alt="Festival 36 y Fabulosa">
            </div>
            
            <div>
                <button class="action-btn" id="start-experience">¡DARLE PLAY AL SETLIST!</button>
            </div>
        </div>
    </main>

    <audio id="event-theme" src="musica.mp3" loop></audio>

    <script>
        // Fecha del evento: 9 de Junio de 2026
        const targetDate = new Date('June 9, 2026 00:00:00').getTime();
        const audio = document.getElementById('event-theme');

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                // Intercambio automático de pantallas
                document.getElementById('countdown-zone').style.display = 'none';
                document.getElementById('reveal-zone').style.display = 'block';
                clearInterval(countdownInterval);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days < 10 ? '0' + days : days;
            document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        const countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown();

        // Acción del botón (Activa el audio cuando el usuario interactúa)
        document.getElementById('start-experience').addEventListener('click', function() {
            audio.play().catch(err => console.log("Audio bloqueado temporalmente por el navegador."));
            this.innerText = "¡DISFRUTA DEL CONCIERTO!";
            this.style.background = "#22c55e"; // Cambia a verde éxito
            this.style.boxShadow = "0 5px 20px rgba(34, 197, 94, 0.4)";
        });
    </script>
</body>
</html>
